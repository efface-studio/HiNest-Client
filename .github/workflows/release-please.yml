# Conventional commit 메시지를 모아 자동으로 GitHub Release + CHANGELOG 를 만든다.
#
# 동작 방식:
#  1) main 에 새 커밋이 푸시되면 release-please 가 누적된 \`feat:\` / \`fix:\` 등을 분석.
#  2) 다음 릴리즈 후보가 생기면 \"chore(main): release X.Y.Z\" 풀 리퀘스트를 자동 작성/갱신.
#     - 패키지 버전을 SemVer 규칙대로 올린 commit (각 package.json 의 \`version\` 수정).
#     - CHANGELOG.md 에 변경 내역 누적.
#  3) 그 PR 을 사람이 머지하면 동일 워크플로우가 다시 돌면서 태그 \`vX.Y.Z\` + GitHub Release 를 생성.
#  4) Release notes 본문은 conventional commits 그룹별로 정리되어 들어감.
#
# 왜 release-please ?
#  - semantic-release 와 달리 \"PR 을 사람이 검토/머지\" 단계가 있어서 의도치 않은 메이저 점프나
#    잘못 분류된 변경을 막을 수 있다. 이미 PR 기반 워크플로 가 정착돼있어 흐름이 자연스러움.
#  - 모노레포(client / server / desktop) 의 패키지 버전을 한 PR 로 동기화.

name: Release Please

on:
  push:
    branches: [main]
  # 수동 트리거 — 권한 토글 직후 등 즉시 검증/재실행이 필요할 때 사용.
  workflow_dispatch:

permissions:
  contents: write     # 태그 / 릴리스 / CHANGELOG 커밋
  pull-requests: write # 릴리스 PR 생성/갱신

# 동시 실행 1개로 — push 가 빨리 들어와도 release PR 생성을 직렬화.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # GITHUB_TOKEN 으로 충분 — 별도 PAT 불필요.
          token: ${{ secrets.GITHUB_TOKEN }}

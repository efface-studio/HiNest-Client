    <!-- ───────── 앱 스플래시(설치형 앱 전용) ─────────
         처음엔 배지(로고)만 떠 있다가 'HiNest' 글자가 옆에서 스르륵 펼쳐지는 2초 인트로.
         네이티브 스플래시(솔리드 배경)를 내린 직후 main.tsx 가 애니메이션을 시작한다.
         일반 웹 브라우저에서는 아래 스크립트가 즉시 제거해 보이지 않는다. -->
    <style id="hinest-splash-style">
      #hinest-splash {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; align-items: center; justify-content: center;
        background: #F5F6F8; color: #0C1020;
        -webkit-user-select: none; user-select: none;
        transition: opacity .45s ease;
      }
      #hinest-splash.hs-dark { background: #0E1014; color: #FFFFFF; }
      #hinest-splash.hs-hide { opacity: 0; pointer-events: none; }
      #hinest-splash .hs-logo {
        display: flex; align-items: center; gap: 8px;
        transform: translateX(99px); /* 배지만 보일 땐 배지를 화면 중앙에(글자 펼쳐지며 전체 중앙 정렬) */
        will-change: transform;
      }
      #hinest-splash .hs-badge { width: 60px; height: 60px; flex: none; opacity: 0; }
      #hinest-splash .hs-word { height: 46px; width: auto; flex: none; opacity: 0; clip-path: inset(0 100% 0 0); }
      #hinest-splash.hs-go .hs-badge { animation: hs-badge-in .56s cubic-bezier(.2,.85,.25,1) both; }
      #hinest-splash.hs-go .hs-word { animation: hs-word-in .60s cubic-bezier(.2,.85,.25,1) .52s both; }
      #hinest-splash.hs-go .hs-logo { animation: hs-recenter .60s cubic-bezier(.2,.85,.25,1) .52s both; }
      @keyframes hs-badge-in { 0% { opacity: 0; transform: scale(.64); } 60% { opacity: 1; } 100% { opacity: 1; transform: scale(1); } }
      @keyframes hs-word-in { 0% { opacity: 0; clip-path: inset(0 100% 0 0); transform: translateX(-8px); } 100% { opacity: 1; clip-path: inset(0 0 0 0); transform: translateX(0); } }
      @keyframes hs-recenter { to { transform: translateX(0); } }
      @media (prefers-reduced-motion: reduce) {
        #hinest-splash.hs-go .hs-badge,
        #hinest-splash.hs-go .hs-word,
        #hinest-splash.hs-go .hs-logo { animation-duration: .01ms !important; animation-delay: 0s !important; }
      }
    </style>

    <script>
      (function () {
        var s = document.getElementById('hinest-splash');
        if (!s) return;
        var started = false, removed = false;
        function remove() { if (removed) return; removed = true; try { s.parentNode && s.parentNode.removeChild(s); } catch (e) {} }
        function dismiss() { s.classList.add('hs-hide'); setTimeout(remove, 480); }
        window.__hinestSplashGo = function () {
          if (started) return; started = true;
          s.classList.add('hs-go');     // 배지 페이드인 → 로고 슬라이드인
          setTimeout(dismiss, 2000);    // 2초 유지 후 페이드아웃
        };
        // 새로고침(당겨서 새로고침 = location.reload)엔 스플래시를 다시 띄우지 않는다 — 콜드 실행만.
        // sessionStorage 는 reload 엔 유지되고, 앱을 껐다 켜면(새 WebView 컨텍스트) 비워진다.
        try {
          if (sessionStorage.getItem('hinest:splashed')) { remove(); return; }
          sessionStorage.setItem('hinest:splashed', '1');
        } catch (e) {}
        // 테마 — 앱 저장값(hinest.theme) 우선, 없으면 시스템 설정.
        try {
          var t = localStorage.getItem('hinest.theme');
          var dark = t === 'dark' || ((t === 'system' || !t) && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) s.classList.add('hs-dark');
        } catch (e) {}
        // 설치형 앱(Capacitor 네이티브 또는 standalone PWA)에서만 스플래시. 일반 웹은 즉시 제거.
        var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
        var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
        if (!isNative && !isStandalone) { remove(); return; }
        // 네이티브는 main.tsx 가 네이티브 스플래시를 내린 직후 __hinestSplashGo() 를 부른다.
        // standalone PWA(네이티브 아님)는 여기서 바로 시작. 네이티브도 안전망으로 1.1초 뒤 자동 시작.
        if (!isNative) window.__hinestSplashGo();
        setTimeout(function () { window.__hinestSplashGo && window.__hinestSplashGo(); }, 1100);
        setTimeout(remove, 5200); // 극단적 실패 대비 하드 제거
      })();
    </script>
